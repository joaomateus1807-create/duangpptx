<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação Refinada</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f4f1ea;
        }

        .presentation-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease-in-out;
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
            z-index: 1;
        }

        /* AJUSTADO EXATAMENTE PARA O SEU ARQUIVO .PNG */
        #slide1 {
            background-image: url('Captura de tela 2026-06-07 201238_cleanup.png');
        }

        /* CARD CENTRALIZADO QUE COBRE O BORRÃO COM ESTILO DE SCRAPBOOK */
        .center-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            width: 550px;
            min-height: 250px;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.1);
            border-radius: 4px;
            transform: rotate(-1deg);
            z-index: 10;
            border: 1px dashed #7ea3a6;
            text-align: center;
        }

        h1 {
            font-family: 'Arial', sans-serif;
            font-size: 2.5rem;
            color: #1a4a54;
            font-weight: bold;
            margin-bottom: 15px;
        }

        p {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem;
            color: #333;
            line-height: 1.5;
        }

        /* NAVEGAÇÃO INTERATIVA */
        .navigation-controls {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            display: flex;
            gap: 10px;
            align-items: center;
            background: #ffffff;
            padding: 8px 15px;
            border: 2px solid #222;
            box-shadow: 4px 4px 0px #222;
        }

        .nav-btn {
            width: 40px;
            height: 40px;
            background: #fff;
            border: 1px solid #222;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="presentation-container">

        <!-- SLIDE 1 USANDO SUA IMAGEM EM PNG -->
        <div class="slide active" id="slide1">
            <div class="center-card">
                <h1>SEU TÍTULO AQUI</h1>
                <p>O texto inserido neste bloco flutua exatamente sobre a região central, cobrindo as imperfeições e finalizando o design do template.</p>
            </div>
        </div>

        <!-- CONTROLES -->
        <div class="navigation-controls">
            <span style="font-family: Arial, sans-serif; font-weight: bold; margin-right: 10px;">1 / 1</span>
            <button class="nav-btn" id="prevBtn">&#10094;</button>
            <button class="nav-btn" id="nextBtn">&#10095;</button>
        </div>

    </div>

    <script>
        const slides = document.querySelectorAll('.slide');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        
        let currentSlideIndex = 0;
        const totalSlides = slides.length;

        function updateSlides() {
            slides.forEach(slide => slide.classList.remove('active'));
            slides[currentSlideIndex].classList.add('active');
        }

        nextBtn.addEventListener('click', () => {
            currentSlideIndex = (currentSlideIndex < totalSlides - 1) ? currentSlideIndex + 1 : 0;
            updateSlides();
        });

        prevBtn.addEventListener('click', () => {
            currentSlideIndex = (currentSlideIndex > 0) ? currentSlideIndex - 1 : totalSlides - 1;
            updateSlides();
        });
    </script>
</body>
</html>
